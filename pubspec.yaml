name: partner_app
description: Astrobless Partner — Astrologer app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # Local storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  pinput: ^5.0.0

  # Icons
  cupertino_icons: ^1.0.8

  # Snackbar / overlays (context-free toasts)
  get: ^4.6.6

  # Utilities
  crypto: ^3.0.3
  intl: ^0.20.2
  gap: ^3.0.1
  collection: ^1.18.0
  equatable: ^2.0.7

  # Connectivity
  connectivity_plus: ^6.1.4

  # Real-time (Socket.IO)
  socket_io_client: ^2.0.3+1

  # Voice / video calls
  agora_rtc_engine: ^6.3.2

  # Image & files
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.4.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Freezed models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logo.jpg"
  image_path_android: "assets/app_logo.jpg"
  image_path_ios: "assets/app_logo.jpg"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_logo.jpg"
    background_color: "#0D0B1E"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/app_logo.jpg
